.picker-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.mode-btns{display:flex;gap:5px}
.mbtn{font-size:11px;font-weight:700;padding:6px 14px;border-radius:7px;border:1px solid rgba(255,255,255,.1);cursor:pointer;background:transparent;color:rgba(255,255,255,.4);font-family:'Inter',sans-serif;transition:all .15s}
.mbtn:hover{color:rgba(255,255,255,.7)}
.mbtn.on{background:rgba(96,165,250,.2);border-color:#60a5fa;color:#60a5fa}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.ppill{font-size:11px;font-weight:600;padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.08);cursor:pointer;background:transparent;color:rgba(255,255,255,.35);font-family:'Inter',sans-serif;white-space:nowrap}
.ppill:hover{color:rgba(255,255,255,.7)}
.ppill.on{background:rgba(96,165,250,.18);border-color:#60a5fa;color:#60a5fa}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.mc{border-radius:12px;padding:16px 18px;position:relative}
.mc-deep{background:#152e22}.mc-meet{background:#111c36}.mc-score{background:#241b0e}.mc-other{background:#1c1530}
.mc-bar{width:3px;height:32px;border-radius:0 2px 2px 0;position:absolute;left:0;top:50%;transform:translateY(-50%)}
.mc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;opacity:.45;margin-bottom:6px;padding-left:12px}
.mc-val{font-size:30px;font-weight:700;line-height:1;margin-bottom:3px;padding-left:12px}
.mc-sub{font-size:10px;opacity:.38;line-height:1.5;padding-left:12px}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#60a5fa;margin-bottom:8px;margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.card{background:#131e33;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 18px;margin-bottom:10px}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:13px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.4)}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pb-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.pb-lbl{color:rgba(255,255,255,.5)}.pb-val{font-weight:600}
.pb-bg{height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:9px}
.pb-fill{height:100%;border-radius:3px}
.score-num{font-size:46px;font-weight:700;line-height:1;margin-bottom:2px}
.score-sub{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:14px}
.tl-row{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.tl-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);width:52px;flex-shrink:0;text-align:right}
.tl-track{flex:1;position:relative;height:20px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.tl-blk{position:absolute;height:100%;border-radius:2px;opacity:.88}
.tl-hrs{display:flex;justify-content:space-between;padding-left:61px;font-size:9px;color:rgba(255,255,255,.15);margin-top:3px}

.ins-ttl{font-size:12px;font-weight:600;margin-bottom:3px}
.ins-txt{font-size:11px;line-height:1.65;opacity:.7}

.wc-fill{height:100%;border-radius:2px}

.empty{text-align:center;padding:2rem;color:rgba(255,255,255,.2);font-size:12px}

.sp{width:36px;height:36px;border:3px solid rgba(96,165,250,.15);border-top-color:#60a5fa;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

.ss{font-size:11px;color:rgba(255,255,255,.25)}

function classify(t,a,d){
  if(/^remind:/i.test(t)) return 'REMIND';
  if(/training|best practice|workshop|ai agent|legal|luật|skai/i.test(t)) return 'TRAINING';
  if(/ăn|xế|tối|cơm|lunch|break|iwd|women/i.test(t)) return 'BREAK';
  if(a>=3||/meeting|weekly|catchup|coe|align|checkpoint|champion|discussion/i.test(t)) return 'COLLAB';
  if(d>=60&&a<=1) return 'DEEP';
  if(d>=30&&/dev|setup|plan|report|vgu|ags|tracking|pixel|audience|opt|scanmax|reconcile|roadmap|release|assign/i.test(t)) return 'DEEP';
  return d<20 ? 'SHALLOW' : 'SHALLOW';
}

function buildWk(mon,idx){
  var dt=[],lb=[],dn=['T2','T3','T4','T5','T6'];
  for(var i=0;i<5;i++){var d=new Date(mon);d.setDate(d.getDate()+i);dt.push(fd(d));lb.push(dn[i]+' '+p2(d.getDate()));}
  var fri=new Date(mon);fri.setDate(fri.getDate()+4);
  var m=mon.getMonth()+1;
  return{key:'w'+idx,
    label:p2(mon.getDate())+'–'+p2(fri.getDate())+'/'+p2(m),
    full:p2(mon.getDate())+' – '+p2(fri.getDate())+' / '+p2(m)+' / '+mon.getFullYear(),
    start:dt[0],end:dt[4],days:lb,dates:dt};
}

function load(){
  try{
    var data=STATIC_DATA;
    EV=data.events.map(function(ev){
      var sd=new Date(ev.start),ed=new Date(ev.end),dur=(ed-sd)/60000;
      if(sd.getDay()===0||sd.getDay()===6||dur<=0) return null;
      return{title:ev.title,s:fd(sd)+'T'+p2(sd.getHours())+':'+p2(sd.getMinutes()),sd:sd,ed:ed,dur:dur,att:ev.att||0,cat:classify(ev.title,ev.att||0,dur)};
    }).filter(Boolean);
    lft=new Date();
    var allD=EV.map(function(e){return e.sd;}),mn=new Date(Math.min.apply(null,allD)),mx=new Date(Math.max.apply(null,allD));
    WK=[];var cur=gmon(mn),idx=1;
    while(cur<=mx){
      var wk=buildWk(cur,idx);
      if(EV.some(function(e){return e.s>=wk.start&&e.s<=wk.end+'T23:59';})) WK.push(wk);
      cur.setDate(cur.getDate()+7);idx++;
    }
    var mm={};
    EV.forEach(function(e){var k=e.sd.getFullYear()+'-'+p2(e.sd.getMonth()+1);if(!mm[k])mm[k]={y:e.sd.getFullYear(),m:e.sd.getMonth()+1};});
    MO=Object.keys(mm).sort().map(function(k,i){
      var v=mm[k],s=new Date(v.y,v.m-1,1),e=new Date(v.y,v.m,0);
      var wks=WK.filter(function(w){return w.start>=fd(s)&&w.start<=fd(e);});
      return{key:'m'+(i+1),label:'Tháng '+v.m+'/'+v.y,full:'Tháng '+v.m+' / '+v.y,start:fd(s),end:fd(e),weeks:wks};
    });
    document.getElementById('hm').innerHTML=data.email+'<br><span style="color:#10B981">● Static</span> · '+data.updated;
    active=WK.length?WK[WK.length-1].key:'';
    buildPills();refresh();
  }catch(e){showErr(e.message);}
}

  '<div class="card"><div class="card-title">Score breakdown</div><div class="score-num" style="color:'+sc(s2)+'">'+s2+'</div><div class="score-sub">'+(s2>=65?'Năng suất tốt':s2>=45?'Cần cải thiện':'Cần chú ý')+' · target 75+</div>'+sr+'</div>'+
  '</div>'+
  '<div class="card"><div class="card-title">Phân bổ theo ngày</div><div class="legend">'+leg+'</div><div style="position:relative;height:185px"><canvas id="bar"></canvas></div></div>'+
  '<div class="card"><div class="card-title">Timeline · 6h–22h</div><div class="legend">'+leg+'</div>'+tl(ev,wk.dates,wk.days)+'<div class="tl-hrs"><span>6h</span><span>8h</span><span>10h</span><span>12h</span><span>14h</span><span>16h</span><span>18h</span><span>20h</span><span>22h</span></div></div>'+
  '<div class="card"><div class="card-title">Free Time — Cơ hội Deep Work</div>'+gapHTML(ev)+'</div>'+
  '<div class="card"><div class="card-title">Top 8 activities</div><div style="position:relative;height:248px"><canvas id="top"></canvas></div></div>'+
  '<div class="sec-lbl">AI Insights & Khuyến nghị</div>'+
  '<div class="card"><div class="card-title">Tự động phân tích từ lịch thực tế</div>'+insHTML(mkIns(ev,tot,wm,wk.full))+'</div>'+
  '<div class="sec-lbl">Sự kiện</div>'+
  '<div class="card"><div class="tabs" id="ft"></div><div id="evl"></div></div>';

  ch.pie=new Chart(document.getElementById('pie'),{type:'doughnut',data:{labels:ck.map(function(k){return C[k].l;}),datasets:[{data:ck.map(function(k){return+(tot[k]/60).toFixed(1);}),backgroundColor:ck.map(function(k){return C[k].c;}),borderWidth:0,hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.parsed+'h';}}}}}});
  ch.bar=new Chart(document.getElementById('bar'),{type:'bar',data:{labels:wk.days,datasets:['DEEP','COLLAB','SHALLOW','TRAINING','BREAK'].map(function(k){return{label:C[k].l,data:dm.map(function(d){return+(d[k]/60).toFixed(1);}),backgroundColor:C[k].c,borderRadius:2,borderSkipped:false};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:TC,font:{size:10}},grid:{color:GC}},y:{stacked:true,ticks:{callback:function(v){return v+'h';},color:TC,font:{size:10}},grid:{color:GC}}}}});
  var t8=ev.filter(function(e){return e.cat!=='REMIND';}).sort(function(a,b){return b.dur-a.dur;}).slice(0,8);
  if(t8.length) ch.top=new Chart(document.getElementById('top'),{type:'bar',data:{labels:t8.map(function(e){return e.title.length>36?e.title.slice(0,34)+'…':e.title;}),datasets:[{data:t8.map(function(e){return Math.round(e.dur);}),backgroundColor:t8.map(function(e){return C[e.cat].c;}),borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.parsed.x+'p';}}}},scales:{x:{ticks:{callback:function(v){return v+'p';},color:TC,font:{size:10}},grid:{color:GC}},y:{ticks:{color:TC,font:{size:10}},grid:{display:false}}}}});
  setupEv(ev,wk);
}

function renderMonth(mo){
  var al=evIn(mo.start,mo.end),tot=calcM(al);
  var wkeys=['DEEP','COLLAB','SHALLOW','TRAINING'],wm=wkeys.reduce(function(s,k){return s+(tot[k]||0);},0);
  var dr=wm>0?Math.round(tot.DEEP/wm*100):0,ml=wm>0?Math.round(tot.COLLAB/wm*100):0;
  var me=al.filter(function(e){return e.cat==='COLLAB';}),am=me.length?Math.round(me.reduce(function(s,e){return s+e.dur;},0)/me.length):0;
  var s2=score(tot,al),ck=Object.keys(C);
  var ws=mo.weeks.map(function(wk){var e=evIn(wk.start,wk.end),t=calcM(e),w=wkeys.reduce(function(s,k){return s+(t[k]||0);},0);return{label:wk.label,e:e,t:t,wm:w,s:score(t,e),dr:w>0?Math.round(t.DEEP/w*100):0,ml:w>0?Math.round(t.COLLAB/w*100):0};});

  document.getElementById('dash').innerHTML=lbar()+
  '<div class="metrics">'+
  '<div class="mc mc-deep"><div class="mc-bar" style="background:#10B981"></div><div class="mc-lbl">Deep Work avg</div><div class="mc-val" style="color:#10B981">'+dr+'%</div><div class="mc-sub">'+fh(tot.DEEP)+' tổng</div></div>'+
  '<div class="mc mc-meet"><div class="mc-bar" style="background:#60a5fa"></div><div class="mc-lbl">Meeting Load</div><div class="mc-val" style="color:#60a5fa">'+ml+'%</div><div class="mc-sub">'+me.length+' cuộc · avg '+am+'p</div></div>'+
  '<div class="mc mc-score"><div class="mc-bar" style="background:'+sc(s2)+'"></div><div class="mc-lbl">Avg Score</div><div class="mc-val" style="color:'+sc(s2)+'">'+s2+'</div><div class="mc-sub">/ 100</div></div>'+
  '<div class="mc mc-other"><div class="mc-bar" style="background:#a78bfa"></div><div class="mc-lbl">Tổng events</div><div class="mc-val" style="color:#a78bfa">'+al.filter(function(e){return e.cat!=='REMIND';}).length+'</div><div class="mc-sub">'+fh(wm)+' work hours</div></div>'+
  '</div>'+
  '<div class="sec-lbl">So sánh các tuần</div>'+
  '<div class="wc-grid">'+ws.map(function(w,i){var prev=i>0?ws[i-1]:null,diff=prev?w.s-prev.s:null,ti=diff===null?'':'<span class="'+(diff>0?'trend-up':diff<0?'trend-dn':'trend-eq')+'">'+(diff>0?'↑+'+diff:diff<0?'↓'+diff:'→0')+'</span>';return'<div class="wc"><div class="wc-lbl">'+w.label+'</div><div class="wc-score" style="color:'+sc(w.s)+'">'+w.s+'<span style="font-size:12px;opacity:.4"> /100</span> '+ti+'</div><div class="wc-bar"><div class="wc-fill" style="width:'+w.s+'%;background:'+sc(w.s)+'"></div></div><div class="wc-stat">Deep '+w.dr+'% · Meet '+w.ml+'%<br>'+w.e.filter(function(e){return e.cat!=='REMIND';}).length+' events · '+fh(w.wm)+'</div></div>';}).join('')+'</div>'+
  '<div class="g2">'+
  '<div class="card"><div class="card-title">Phân bổ cả tháng</div><div class="legend">'+ck.map(function(k){return'<span class="li"><span class="ld" style="background:'+C[k].c+'"></span>'+C[k].l+'</span>';}).join('')+'</div><div style="position:relative;height:175px"><canvas id="pie"></canvas></div></div>'+
  '<div class="card"><div class="card-title">Score xu hướng</div><div style="position:relative;height:175px"><canvas id="trend"></canvas></div></div>'+
  '</div>'+
  '<div class="card"><div class="card-title">Deep Work vs Meeting theo tuần</div><div style="position:relative;height:180px"><canvas id="bar"></canvas></div></div>'+
  '<div class="sec-lbl">AI Insights tháng</div>'+
  '<div class="card"><div class="card-title">Phân tích xu hướng</div>'+insHTML(mkIns(al,tot,wm,mo.full))+'</div>'+
  '<div class="sec-lbl">Tất cả sự kiện</div>'+
  '<div class="card"><div class="tabs" id="ft"></div><div id="evl"></div></div>';

  ch.pie=new Chart(document.getElementById('pie'),{type:'doughnut',data:{labels:ck.map(function(k){return C[k].l;}),datasets:[{data:ck.map(function(k){return+(tot[k]/60).toFixed(1);}),backgroundColor:ck.map(function(k){return C[k].c;}),borderWidth:0,hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.parsed+'h';}}}}}});
  ch.trend=new Chart(document.getElementById('trend'),{type:'line',data:{labels:ws.map(function(w){return w.label;}),datasets:[{data:ws.map(function(w){return w.s;}),borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,.1)',tension:.4,fill:true,pointBackgroundColor:ws.map(function(w){return sc(w.s);}),pointRadius:5,pointBorderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return'Score: '+ctx.parsed.y;}}}},scales:{x:{ticks:{color:TC,font:{size:10}},grid:{color:GC}},y:{min:0,max:100,ticks:{color:TC,font:{size:10}},grid:{color:GC}}}}});
  ch.bar=new Chart(document.getElementById('bar'),{type:'bar',data:{labels:ws.map(function(w){return w.label;}),datasets:[{label:'Deep Work',data:ws.map(function(w){return w.dr;}),backgroundColor:'#10B981',borderRadius:2,borderSkipped:false},{label:'Meeting',data:ws.map(function(w){return w.ml;}),backgroundColor:'#60a5fa',borderRadius:2,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:TC,font:{size:10}},grid:{display:false}},y:{ticks:{callback:function(v){return v+'%';},color:TC,font:{size:10}},grid:{color:GC}}}}});
  setupEv(al,{days:mo.weeks.flatMap(function(w){return w.days;}),dates:mo.weeks.flatMap(function(w){return w.dates;})});
}

function buildPills(){
  var pp=document.getElementById('pills'),items=mode==='week'?WK:MO;
  pp.innerHTML=items.map(function(x){return'<button class="ppill'+(x.key===active?' on':'')+'" data-k="'+x.key+'">'+x.label+'</button>';}).join('');
  pp.onclick=function(ev){var b=ev.target.closest('.ppill');if(!b)return;active=b.dataset.k;document.querySelectorAll('.ppill').forEach(function(x){x.classList.toggle('on',x.dataset.k===active);});refresh();};
}
function refresh(){
  Object.values(ch).forEach(function(c){try{c.destroy();}catch(e){}});ch={};
  if(mode==='week'){var wk=WK.find(function(w){return w.key===active;});if(wk)renderWeek(wk);}
  else{var mo=MO.find(function(m){return m.key===active;});if(mo)renderMonth(mo);}
}
document.querySelector('.mode-btns').onclick=function(ev){
  var b=ev.target.closest('.mbtn');if(!b)return;
  mode=b.dataset.mode;
  document.querySelectorAll('.mbtn').forEach(function(x){x.classList.toggle('on',x.dataset.mode===mode);});
  active=mode==='week'?(WK.length?WK[WK.length-1].key:''):(MO.length?MO[MO.length-1].key:'');
  buildPills();refresh();
};
load();
</script>
</body>
</html>
